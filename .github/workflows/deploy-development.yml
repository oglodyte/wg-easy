name: Development

on:
  workflow_dispatch:

jobs:
  docker-build:
    name: Build Docker
    runs-on: ${{ matrix.arch.os }}
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/arm64
            os: ubuntu-24.04-arm
          # - platform: linux/arm/v7
          #   os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Prepare
        id: prepare
        run: |
          platform=${{ matrix.arch.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/wg-easy" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ steps.prepare.outputs.image }}
          flavor: |
            latest=false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.arch.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.prepare.outputs.image }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=min,scope=build-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Merge & Deploy Docker
    runs-on: ubuntu-latest
    permissions:
      packages: write
    needs: docker-build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare image name
        id: prepare
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/wg-easy" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ steps.prepare.outputs.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=development

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ steps.prepare.outputs.image }}
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(for digest in *; do printf '%s@sha256:%s ' "$IMAGE_NAME" "$digest"; done)

      - name: Inspect image
        env:
          IMAGE_NAME: ${{ steps.prepare.outputs.image }}
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.meta.outputs.version }}"

  docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    if: github.repository_owner == 'wg-easy'
    permissions:
      contents: write
    needs: docker-merge
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11.9
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install Dependencies
        run: |
          pip install -r docs/requirements.txt

      - name: Setup Git User
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Build Docs Website
        run: |
          cd docs
          git fetch origin gh-pages --depth=1 || true

          mike deploy --push --update-aliases development
